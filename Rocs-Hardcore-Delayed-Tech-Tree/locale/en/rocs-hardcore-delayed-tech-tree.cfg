[mod-setting-description]
rocs-hardcore-push-back-repair-pack=Pushes 'Repair pack' back in the tech tree, requiring logistic science packs.
rocs-hardcore-push-back-landfill=Pushes 'Landfill' back in the tech tree, requiring 'Agriculture'.
rocs-hardcore-push-back-logistic-system=Pushes 'Logistic system' back in the tech tree, requiring metallurgic, electromagnetic and agricultural science packs.
rocs-hardcore-push-back-cliff-explosives=Pushes 'Cliff explosives' back in the tech tree, requiring metallurgic, military, electromagnetic and agricultural science packs.
rocs-hardcore-push-back-kovarex-enrichment=Pushes 'Kovarex enrichment' back in the tech tree, requiring agricultural and electromagnetic science packs.
rocs-hardcore-push-back-atomic-bomb=Pushes these two technologies back to require agricultural and electromagnetic science packs.
rocs-hardcore-z-infinite-tech-needs-cryogenic=Each infinite research technology is converted into a single technology with a new infinite descendent requiring cryogenic science packs. Note that only the infinite (final) technology is delayed, not any single-research steps before it.

