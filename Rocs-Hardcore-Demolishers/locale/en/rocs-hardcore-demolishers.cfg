[mod-setting-description]
rocs-hardcore-demolishers-a-cargo-drops-need-research=Players and construction bots are exempted.
rocs-hardcore-segmented-unit-speed-factor=Affects the speed, acceleration and turning radius when disturbed. A value of 1 means no change.
rocs-hardcore-advanced-casting-recipe=Foundries cannot cast complex recipes until a new technology is researched which requires automation, logistic, chemical and metallurgic science packs. As with other Roc's Hardcore mods, this incentivizes a small science build prior to launching a rocket.
rocs-hardcore-vulcanus-condensed-map=The overall size of the map is reduced. Resource patches are smaller and more numerous.

[technology-name]
advanced-casting=Advanced casting

[technology-description]
advanced-casting=Allows foundries to cast more complex recipes.
foundry=Allows more advanced smelting. Note: Hardcore Mode has moved some recipe unlocks from here to the 'Advanced casting' technology.

