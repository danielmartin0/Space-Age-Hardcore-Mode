map_info_main_caption=--袩懈写卸械芯褌褌芯--
map_info_sub_caption=    ~~泻褉麓褉麓褉麓褉麓褉邪褏~~
map_info_text=袣褍褋邪泻懈 褍谢芯胁懈谢懈 蟹邪锌邪褏 褉褘斜褘 薪邪 褉褘薪泻械.\n袨褌褉邪卸邪泄褌械 懈褏 泻邪泻 屑芯卸薪芯 写芯谢褜褕械!\n协褌芯, 芯写薪邪泻芯, 斜褍写械褌 薪械锌褉芯褋褌芯泄 蟹邪写邪褔械泄,\n锌芯褋泻芯谢褜泻褍 懈褏 褋懈谢邪 懈 褋芯锌褉芯褌懈胁谢械薪懈械 锌芯褋褌芯褟薪薪芯 胁芯蟹褉邪褋褌邪褞褌 褋 褌械褔械薪懈械屑 胁褉械屑械薪懈.\n\n袙邪褕邪 泻芯薪械褔薪邪褟 褑械谢褜 - 褝胁邪泻褍懈褉芯胁邪褌褜 胁褋褞 褉褘斜褍!\n袩芯屑械褋褌懈褌械 械褢 胁 谐褉褍蟹芯胁褍褞 褉邪泻械褌褍 懈 蟹邪锌褍褋褌懈褌械 胁 泻芯褋屑芯褋.\n袧械 胁芯谢薪褍泄褌械褋褜, 胁褘 胁褋褢 褉邪胁薪芯 锌芯谢褍褔懈褌械 泻芯褋屑懈褔械褋泻褍褞 薪邪褍泻褍.\n\n袪褘薪芯泻 褋 褉邪写芯褋褌褜褞 锌褉懈屑械褌 谢褞斜褘械 屑芯薪械褌褘, 泻芯褌芯褉褘械 胁褘 薪邪泄写褢褌械.\n袛芯锌芯谢薪懈褌械谢褜薪褘械 褋谢芯褌褘 写谢褟 褌褍褉械谢械泄 屑芯卸薪芯 泻褍锌懈褌褜 薪邪 褉褘薪泻械.\n孝邪泻卸械 写芯褋褌褍锌薪芯 薪械褋泻芯谢褜泻芯 褍薪懈泻邪谢褜薪褘褏 褍谢褍褔褕械薪懈泄.\n袠褋褋谢械写芯胁邪薪懈械 褌邪薪泻芯胁 芯褌泻褉芯械褌 邪褉褌懈谢谢械褉懈褞 薪邪 褉邪薪薪械屑 褝褌邪锌械.\n袥褞斜芯泄 泻芯薪褌械泄薪械褉 褋 芯锌邪褋薪褘屑懈 谐褉褍蟹邪屑懈, 褌邪泻懈屑懈 泻邪泻 斜芯械锌褉懈锌邪褋褘, 谐褉邪薪邪褌褘 懈谢懈 斜芯褔泻懈,\n褋懈谢褜薪芯 胁蟹褉褘胁邪械褌褋褟 锌褉懈 锌芯谢芯屑泻械.\n袙芯蟹屑芯卸薪芯, 褝褌芯 屑芯卸械褌 斜褘褌褜 懈褋锌芯谢褜蟹芯胁邪薪芯 胁 薪邪褕懈褏 懈薪褌械褉械褋邪褏.
